name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements-shared.txt
          pip install pytest pytest-asyncio respx
      - name: Run tests
        run: |
          python -m pytest \
            services/profile/tests/test_bkt.py \
            services/graph/tests/test_zpd.py \
            services/macro/tests/ \
            services/retrieval/tests/ \
            services/clustering/tests/ \
            services/e2e/tests/ \
            tools/tests/ \
            -q
