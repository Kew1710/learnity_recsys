  /api/v1/chats/{partnerID}/ws:
    get:
      operationId: getChatWs
      summary: Full-duplex WebSocket чат
      description: |
        Full-duplex чат-канал между текущим пользователем и `partnerID`.
        Поддерживает авторизацию через `Authorization: Bearer <jwt>`,
        `?access_token=<jwt>` или `Sec-WebSocket-Protocol: bearer,<jwt>`.

        Client -> Server actions:
        - `{"action":"send_message","text":"...","metadata":{...}}`

        Server -> Client events:
        - `chat.subscribed`
        - `chat.message`
        - `chat.error`

        Важно:
        - replay/история по WS не отправляется.
        - история сообщений получается через `GET /api/v1/chats/{partnerID}/messages`.
      tags: [Chat]
      security:
        - BearerAuth: []
      parameters:
        - name: partnerID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '101':
          description: |
            Switching Protocols.

            Пример `chat.message`:
            {
              "event_type": "chat.message",
              "timestamp": "2026-04-07T10:15:00Z",
              "correlation_id": "message-id",
              "message": {
                "id": "message-id",
                "chat_id": "chat-id",
                "sender_id": "user-id",
                "text": "hello",
                "metadata": {},
                "created_at": "2026-04-07T10:15:00Z"
              }
            }

