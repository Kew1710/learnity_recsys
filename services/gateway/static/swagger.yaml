  /api/v1/modules/{moduleID}/tasks/generation/{requestID}/ws:
    get:
      operationId: getModuleTasksGenerationWs
      summary: WebSocket поток статуса генерации
      description: |
        Realtime поток событий генерации для конкретного `requestID`.
        Поддерживает авторизацию через `Authorization: Bearer <jwt>`,
        `?access_token=<jwt>` или `Sec-WebSocket-Protocol: bearer,<jwt>`.

        Server -> Client events:
        - `SUBSCRIBED`
        - `TASK_READY` (обязательно содержит вложенный `task`)
        - `REQUEST_COMPLETED`

        Текущий режим генерации: `topics-only`.

        Важно:
        - `TASK_READY.task` гарантирован и в live-потоке, и в replay после реконнекта.
        - replay отправляет текущий прогресс, если он уже есть.
      tags: [tasks]
      security:
        - BearerAuth: []
      parameters:
        - name: moduleID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: requestID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '101':
          description: |
            Switching Protocols.

            Пример `TASK_READY`:
            {
              "event_type": "TASK_READY",
              "timestamp": "2026-04-07T10:15:00Z",
              "correlation_id": "request-id",
              "request_id": "request-id",
              "slot_id": "slot-1",
              "item_index": 0,
              "task": {
                "id": "assignment-id",
                "task_id": "task-id",
                "body": "Task body",
                "answer_type": "open",
                "metadata": {}
              }
            }
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Доступ запрещен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Запрос генерации не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
