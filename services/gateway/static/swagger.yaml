  /api/v1/recsys/ws:
    get:
      operationId: getRecsysWs
      summary: WebSocket соединение с рекомендательной системой (recsys)
      description: |
        Устанавливает WebSocket соединение. Клиент отправляет один запрос,
        получает ответ и соединение закрывается.

        **Входящие сообщения от клиента:**

        Запрос следующего задания:
        ```json
        { "type": "task_request", "subject": "<subject_uuid>" }
        ```

        Запрос mastery студента:
        ```json
        { "type": "mastery_request", "student_id": "<uuid>", "skill_keys": ["linear_equations"] }
        ```

        Запрос учебного плана (только tutor):
        ```json
        {
          "type": "plan_request",
          "student_id": "<uuid>",
          "mode": "target_mastery",
          "target_skill_key": "quadratic_equations",
          "mastery_threshold": 0.8
        }
        ```

        **Исходящие сообщения от сервера:**

        Рекомендованное задание (`event_type: "task.recommended"`):
        ```json
        { "event_type": "task.recommended", "task_id": "<uuid>", "topic": "...", "recommendation_source": "..." }
        ```

        Mastery ответ (`event_type: "mastery.response"`):
        ```json
        { "event_type": "mastery.response", "student_id": "<uuid>", "levels": [{ "skill_key": "...", "level": 0.74 }] }
        ```

        Учебный план (`event_type: "plan.created"`):
        ```json
        { "event_type": "plan.created", "plan_id": "<uuid>", "student_id": "<uuid>", "steps_count": 5 }
        ```

        Ошибка (`event_type: "error"`):
        ```json
        { "event_type": "error", "code": "forbidden|invalid_request|timeout|internal_error", "message": "..." }
        ```
      tags: [Recsys]
      security:
        - BearerAuth: []
      parameters:
        - name: access_token
          in: query
          required: false
          schema:
            type: string
          description: JWT токен (альтернатива заголовку Authorization для WS)
      responses:
        '101':
          description: WebSocket upgrade
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'

  /api/v1/recsys/results/{requestID}:
    get:
      operationId: getRecsysResultById
      summary: Получить отложенный результат recsys по request_id
      tags: [Recsys]
