      summary: WebSocket поток уведомлений
      description: |
        Realtime поток новых уведомлений для текущего пользователя.
        Поддерживает авторизацию через `Authorization: Bearer <jwt>`,
        `?access_token=<jwt>` или `Sec-WebSocket-Protocol: bearer,<jwt>`.

        Server -> Client events:
        - `notifications.subscribed`
        - `notifications.new`

        Важно:
        - replay/история по WS не отправляется.
        - история получается через `GET /api/v1/notifications`.
      tags: [Notifications]
      security:
        - BearerAuth: []
      responses:
        '101':
          description: |
            Switching Protocols.

            Пример `notifications.new`:
            {
              "event_type": "notifications.new",
              "timestamp": "2026-04-07T10:15:00Z",
              "correlation_id": "notification-id",
              "notification": {
                "id": "notification-id",
                "user_id": "user-id",
                "type": "invitation_accepted",
                "payload": {},
                "is_read": false,
                "created_at": "2026-04-07T10:15:00Z"
              }
            }

