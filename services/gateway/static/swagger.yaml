openapi: 3.0.3
info:
  title: Learnity API
  version: "1.0.0"
  description: |
    Описание на русском языке.
    Описание на русском языке.

servers:
  - url: http://localhost:8080
    description: Описание на русском языке
  - url: https://api.example.com
    description: Описание на русском языке

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Описание на русском языке

  schemas:
    # Common Responses
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Описание на русском языке
        message:
          type: string
          description: Описание на русском языке
      required: [code, message]
      example:
        message: "Сообщение"

    ValidationError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      example:
        message: "Сообщение"

    UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          enum: ["unauthorized"]
      example:
        error: "unauthorized"

    RecsysResultResponse:
      type: object
      required: [request_id, request_type, payload, status, created_at, expires_at]
      properties:
        request_id:
          type: string
          format: uuid
        request_type:
          type: string
          enum: [task_request, mastery_request, plan_request]
        payload:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [pending_delivery, delivered]
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        delivered_at:
          type: string
          format: date-time
          nullable: true

    ForbiddenError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      example:
        message: "Сообщение"

    NotFoundError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      example:
        message: "Сообщение"

    ServerError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      example:
        message: "Сообщение"

    # Pagination
    PaginationParams:
      type: object
      properties:
        page:
          type: integer
          default: 1
          minimum: 1
        limit:
          type: integer
          default: 20
          minimum: 1
          maximum: 100

    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    # Shared primitive/domain schemas
    SubjectID:
      type: string
      format: uuid
      description: Описание на русском языке

    SubjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255

    SubjectResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    DifficultyLevel:
      type: string
      enum: [very_easy, easy, medium, hard, very_hard]

    taskType:
      type: string
      enum: [diagnostic, homework, practice, exam, project]

    QuestionType:
      type: string
      enum: [single_choice, multiple_choice, open, numeric, code]

    SubmissionStatus:
      type: string
      enum: [draft, submitted, graded, reopened, cancelled, outdated]

    InvitationStatus:
      type: string
      enum: [pending, accepted, rejected, expired]

    PaymentStatus:
      type: string
      enum: [pending, succeeded, failed, refunded]

    NotificationType:
      type: string
      enum: [system, task, diagnostic, payment, message, invitation, invitation_accepted, invitation_declined, chat_message, submission_created, submission_appealed, submission_reviewed]

    AnalyticsScope:
      type: string
      enum: [student, course, task, diagnostic, global]

    # Auth Schemas
    LoginRequest:
      type: object
      required: [input, password]
      properties:
        input:
          type: string
          description: Описание на русском языке
          example: "user@example.com"
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          example: "zalupa123"

    LoginResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        time:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserResponse'
        access_token:
          type: string
          description: Описание на русском языке
        refresh_token:
          type: string
          description: Описание на русском языке
      example:
        message: "Сообщение"
        time: "2025-12-14T10:30:00Z"
        user:
          id: "uuid"
          role: "student"
          age: 20
          created_at: "2025-12-14T00:00:00Z"
        access_token: "eyJ..."
        refresh_token: "eyJ..."

    RegistrationRequest:
      type: object
      required: [email, fullname, login, password, role, grade]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          example: "user@example.com"
        login:
          type: string
          minLength: 3
          maxLength: 50
          example: "ivan_petrov"
        fullname:
          type: string
          maxLength: 255
          example: "Пример значения"
        time_zone:
          type: string
          nullable: true
          example: "Europe/Moscow"
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          example: "StrongPass123!"
        role:
          type: string
          enum: [student, tutor]
          example: "student"
        grade:
          type: integer
          minimum: 5
          maximum: 11
          description: "Класс ученика (5–11). Только для роли student"
          example: 9

    RegistrationResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      example:
        message: "Сообщение"

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Описание на русском языке

    RefreshResponse:
      type: object
      properties:
        code:
          type: string
        access_token:
          type: string
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      required: [fcm_token]
      properties:
        fcm_token:
          type: string
          minLength: 1
          example: "fcm_token_value"
        refresh_token:
          type: string
          nullable: true
          example: "refresh_token_value"

    PutUserFcmTokenRequest:
      type: object
      required: [fcm_token]
      properties:
        fcm_token:
          type: string
          minLength: 1
          example: "fcm_token_value"

    StatusResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # User Schemas
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nickname:
          type: string
        email:
          type: string
        fullname:
          type: string
        role:
          type: string
          enum: [student, tutor, admin]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
        tutor:
          type: object
          nullable: true
          properties:
            bio:
              type: string
        student:
          type: object
          nullable: true
          properties:
            courses_count:
              type: integer
            grade:
              type: integer
            parent_contact:
              type: string

    UpdateUserProfileRequest:
      type: object
      minProperties: 1
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          example: "ivan.petrov@example.com"
        nickname:
          type: string
          minLength: 3
          maxLength: 50
          example: "ivan_petrov"
        fullname:
          type: string
          maxLength: 255
          example: "Пример значения"
        current_password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
          description: Описание на русском языке
          example: "currentPassword123"
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
          description: Описание на русском языке
          example: "newStrongPassword123"

    # Course Schemas
    CreateCourseRequest:
      type: object
      required: [title, subject_id, level]
      properties:
        title:
          type: string
          example: "Пример значения"
        description:
          type: string
          nullable: true
          example: "Пример значения"
        subject_id:
          $ref: '#/components/schemas/SubjectID'
        level:
          allOf:
            - $ref: '#/components/schemas/DifficultyLevel'
          example: "very_hard"

    CourseResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tutor_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        subject_id:
          $ref: '#/components/schemas/SubjectID'
        level:
          $ref: '#/components/schemas/DifficultyLevel'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        enrolled_students:
          type: array
          items:
            $ref: '#/components/schemas/EnrolledStudentItem'

    UpdateCourseRequest:
      type: object
      properties:
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        subject_id:
          allOf:
            - $ref: '#/components/schemas/SubjectID'
          nullable: true
        level:
          allOf:
            - $ref: '#/components/schemas/DifficultyLevel'
          nullable: true

    # Module Schemas
    CreateModuleRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: "Пример значения"
        description:
          type: string
          nullable: true

    ModuleResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateModuleRequest:
      type: object
      properties:
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        order:
          type: integer
          nullable: true

    ReorderCourseModulesRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: '#/components/schemas/ReorderModuleItem'

    ReorderModuleItem:
      type: object
      required: [module_id, order]
      properties:
        module_id:
          type: string
          format: uuid
        order:
          type: integer
          minimum: 1

    # task Schemas
    CreatetaskRequest:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateModuleTaskInput'

    CreateModuleTaskInput:
      type: object
      required: [task_id, task_type, attempts]
      properties:
        task_id:
          type: string
          format: uuid
        task_type:
          $ref: '#/components/schemas/taskType'
        deadline:
          type: string
          format: date-time
          nullable: true
        attempts:
          type: integer
          minimum: 1

    taskResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        module_id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        topic:
          type: string
        difficulty:
          $ref: '#/components/schemas/DifficultyLevel'
        answer_type:
          $ref: '#/components/schemas/QuestionType'
        body:
          type: string
        solution:
          type: string
          nullable: true
        metadata:
          type: object
        task_type:
          $ref: '#/components/schemas/taskType'
        deadline:
          type: string
          format: date-time
          nullable: true
        attempts:
          type: integer
        student_attempt:
          type: integer
          nullable: true
        order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    taskQuestionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        topic:
          type: string
        difficulty:
          $ref: '#/components/schemas/DifficultyLevel'
        question_type:
          $ref: '#/components/schemas/QuestionType'
        body:
          type: string
        metadata:
          type: object

    UpdatetaskRequest:
      type: object
      properties:
        task_type:
          allOf:
            - $ref: '#/components/schemas/taskType'
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
        attempts:
          type: integer
          nullable: true
        order:
          type: integer
          nullable: true

    ReorderModuletasksRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: '#/components/schemas/ReordertaskItem'

    ReordertaskItem:
      type: object
      required: [task_id, order]
      properties:
        task_id:
          type: string
          format: uuid
        order:
          type: integer
          minimum: 1

    SubmittaskRequest:
      type: object
      required: [answer]
      properties:
        answer:
          type: string
          nullable: true

    SubmissionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        student_id:
          type: string
          format: uuid
        student_fullname:
          type: string
          nullable: true
        attempt:
          type: integer
        status:
          $ref: '#/components/schemas/SubmissionStatus'
        auto_score:
          type: number
          nullable: true
        manual_score:
          type: number
          nullable: true
        feedback:
          type: string
          nullable: true
        answer:
          type: string
          nullable: true
        attachments:
          type: object
        is_appealed:
          type: boolean
        submitted_at:
          type: string
          format: date-time
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ManualReviewRequest:
      type: object
      required: [score]
      properties:
        score:
          type: integer
          format: int32
          minimum: 0
          maximum: 5
          example: 5
        feedback:
          type: string
          nullable: true
          example: "Пример значения"
        status:
          $ref: '#/components/schemas/SubmissionStatus'

    AppealRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          example: "Пример значения"
    AppealSubmissionResponse:
      type: object
      required: [task_id, is_appealed]
      properties:
        task_id:
          type: string
          format: uuid
        is_appealed:
          type: boolean
    # Question Schemas
    CreateQuestionRequest:
      type: object
      required: [subject_id, topic, difficulty, question_type, body]
      properties:
        subject_id:
          $ref: '#/components/schemas/SubjectID'
        topic:
          type: string
          example: "algebra"
        difficulty:
          $ref: '#/components/schemas/DifficultyLevel'
        question_type:
          $ref: '#/components/schemas/QuestionType'
        body:
          type: string
          example: "Пример значения"
        answer:
          type: string
          nullable: true
          example: "4"
        metadata:
          type: object
          required: [skill_keys]
          properties:
            skill_keys:
              type: array
              minItems: 1
              items:
                type: integer
                format: int32
          example:
            skill_keys:
              - 920
              - 930

    QuestionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        subject_id:
          $ref: '#/components/schemas/SubjectID'
        topic:
          type: string
        difficulty:
          $ref: '#/components/schemas/DifficultyLevel'
        question_type:
          $ref: '#/components/schemas/QuestionType'
        body:
          type: string
        answer:
          type: string
        solution:
          type: string
          nullable: true
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateQuestionRequest:
      type: object
      properties:
        subject_id:
          allOf:
            - $ref: '#/components/schemas/SubjectID'
          nullable: true
        topic:
          type: string
          nullable: true
        difficulty:
          allOf:
            - $ref: '#/components/schemas/DifficultyLevel'
          nullable: true
        question_type:
          allOf:
            - $ref: '#/components/schemas/QuestionType'
          nullable: true
        body:
          type: string
          nullable: true
        answer:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
          required: [skill_keys]
          properties:
            skill_keys:
              type: array
              minItems: 1
              items:
                type: integer
                format: int32
          example:
            skill_keys:
              - 1019

    GenerationStartRequest:
      type: object
      additionalProperties: false
      required: [subject, items]
      properties:
        subject:
          type: string
          minLength: 1
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/GenerationItem'

    GenerationItem:
      type: object
      additionalProperties: false
      required: [theme, answer_type, count, difficulty]
      properties:
        theme:
          type: string
          minLength: 1
        answer_type:
          $ref: '#/components/schemas/QuestionType'
        count:
          type: integer
          minimum: 1
        difficulty:
          type: integer
          minimum: 1
          maximum: 5

    GenerationStartResponse:
      type: object
      properties:
        request_id:
          type: string
          format: uuid
        status:
          type: string
        requested_total:
          type: integer
        created_at:
          type: string
          format: date-time

    GenerationStatusResponse:
      type: object
      properties:
        request_id:
          type: string
          format: uuid
        status:
          type: string
        requested_total:
          type: integer
        generated_total:
          type: integer
        failed_total:
          type: integer
        reason:
          type: string
        created_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time

    GenerationCancelResponse:
      type: object
      properties:
        request_id:
          type: string
          format: uuid
        status:
          type: string

    # Invitation Schemas
    InviteStudentRequest:
      type: object
      required: [student_nickname]
      properties:
        student_nickname:
          type: string
          example: "petr_sidorov"

    EnrollStudentRequest:
      type: object
      minProperties: 1
      properties:
        student_nickname:
          type: string
          minLength: 3
          maxLength: 50
          example: "petr_sidorov"
        student_email:
          type: string
          format: email
          maxLength: 255
          example: "student@example.com"
      description: Описание на русском языке

    EnrolledStudentItem:
      type: object
      required: [id, fullname, nickname]
      properties:
        id:
          type: string
          format: uuid
        fullname:
          type: string
        nickname:
          type: string

    BatchRemoveStudentsRequest:
      type: object
      required: [student_ids]
      properties:
        student_ids:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: string
            format: uuid
          description: Описание на русском языке

    BatchRemoveFailureReason:
      type: string
      enum: [not_found, forbidden, conflict, invalid]

    BatchRemoveFailedItem:
      type: object
      required: [id, reason]
      properties:
        id:
          type: string
          format: uuid
        reason:
          $ref: '#/components/schemas/BatchRemoveFailureReason'
        message:
          type: string

    BatchRemoveResponse:
      type: object
      required: [message, removed_count, failed_items]
      properties:
        message:
          type: string
        removed_count:
          type: integer
        failed_items:
          type: array
          items:
            $ref: '#/components/schemas/BatchRemoveFailedItem'

    BatchRemoveCoursesRequest:
      type: object
      required: [course_ids]
      properties:
        course_ids:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: string
            format: uuid

    BatchRemoveModulesRequest:
      type: object
      required: [module_ids]
      properties:
        module_ids:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: string
            format: uuid

    BatchRemoveDiagnosticsRequest:
      type: object
      required: [diagnostic_ids]
      properties:
        diagnostic_ids:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: string
            format: uuid

    BatchRemoveSubjectsRequest:
      type: object
      required: [subject_ids]
      properties:
        subject_ids:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: string
            format: uuid

    BatchRemoveTasksRequest:
      type: object
      required: [task_ids]
      properties:
        task_ids:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: string
            format: uuid

    BatchRemoveQuestionsRequest:
      type: object
      required: [question_ids]
      properties:
        question_ids:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: string
            format: uuid

    InvitationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tutor_id:
          type: string
          format: uuid
        student_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/InvitationStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    RespondInvitationRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [accept, reject]
          example: "accept"

    # Notification Schemas
    NotificationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/NotificationType'
        payload:
          type: object
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time

    # Chat Schemas
    SendMessageRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          maxLength: 5000
          example: "Пример значения"

    MessageResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        chat_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        metadata:
          type: object
        created_at:
          type: string
          format: date-time

    # Analytics Schemas
    StudentSkillsAnalyticsResponse:
      type: object
      properties:
        analytics:
          type: object
          description: Описание на русском языке
          additionalProperties:
            type: number
            nullable: true

    CourseAnalyticsResponse:
      type: object
      properties:
        submissions_total:
          type: integer
        average_score:
          type: number
        last_activity:
          type: string
          format: date-time

    # Diagnostics Schemas
    DiagnosticQuestionInput:
      type: object
      required: [question_id]
      properties:
        question_id:
          type: string
          format: uuid
        weight:
          type: number
        order:
          type: integer

    CreateDiagnosticRequest:
      type: object
      required: [subject_id, title]
      properties:
        subject_id:
          $ref: '#/components/schemas/SubjectID'
        title:
          type: string
        description:
          type: string
          nullable: true
        questions:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticQuestionInput'

    UpdateDiagnosticRequest:
      type: object
      properties:
        subject_id:
          allOf:
            - $ref: '#/components/schemas/SubjectID'
          nullable: true
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        questions:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticQuestionInput'
          nullable: true

    DiagnosticQuestionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        diagnostic_set_id:
          type: string
          format: uuid
        question_id:
          type: string
          format: uuid
        order:
          type: integer
        weight:
          type: number

    DiagnosticResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        subject_id:
          $ref: '#/components/schemas/SubjectID'
        title:
          type: string
        description:
          type: string
          nullable: true
        created_by:
          type: string
          format: uuid
          nullable: true
        settings:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DiagnosticAnswerInput:
      type: object
      required: [question_id, score]
      properties:
        question_id:
          type: string
          format: uuid
        score:
          type: number

    RunDiagnosticRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticAnswerInput'

    # Skill Maps Schemas
    SkillLevelInput:
      type: object
      required: [skill_key, level]
      properties:
        skill_key:
          type: string
        level:
          type: number

    SkillLevelResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        skill_map_id:
          type: string
          format: uuid
        skill_key:
          type: string
        level:
          type: number
        updated_at:
          type: string
          format: date-time

    SkillMapResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        student_id:
          type: string
          format: uuid
        subject:
          type: string
        levels:
          type: array
          items:
            $ref: '#/components/schemas/SkillLevelResponse'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateSkillMapRequest:
      type: object
      required: [student_id, subject]
      properties:
        student_id:
          type: string
          format: uuid
        subject:
          type: string
        levels:
          type: array
          items:
            $ref: '#/components/schemas/SkillLevelInput'

    # Integrations Schemas
    CreateIntegrationRequest:
      type: object
      required: [type, settings]
      properties:
        org_id:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
        settings:
          type: object

    UpdateIntegrationRequest:
      type: object
      properties:
        org_id:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          nullable: true
        settings:
          type: object
          nullable: true

    IntegrationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
        settings:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # Payments Schemas
    CreatePaymentRequest:
      type: object
      required: [amount, currency, provider]
      properties:
        amount:
          type: number
        currency:
          type: string
        provider:
          type: string
        metadata:
          type: object

    PaymentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        payer_id:
          type: string
          format: uuid
        amount:
          type: number
        currency:
          type: string
        provider:
          type: string
        status:
          $ref: '#/components/schemas/PaymentStatus'
        metadata:
          type: object
        created_at:
          type: string
          format: date-time

