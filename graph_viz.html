<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Граф знаний по математике — Learnity</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223a;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --text-dim: #7a7a9a;
      --grade4: #4a90d9;
      --grade5: #4a90d9;
      --grade6: #3dba6e;
      --grade7: #e8c53a;
      --grade8: #e8823a;
      --grade9: #e84a4a;
      --grade10: #b44ae8;
      --grade11: #e84a8e;
      --accent: #4a90d9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap;
    }

    .header-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-label {
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .grade-btn {
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .grade-btn[data-grade="all"] { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .grade-btn[data-grade="45"] { border-color: var(--grade4); }
    .grade-btn[data-grade="6"] { border-color: var(--grade6); }
    .grade-btn[data-grade="7"] { border-color: var(--grade7); }
    .grade-btn[data-grade="8"] { border-color: var(--grade8); }
    .grade-btn[data-grade="9"] { border-color: var(--grade9); }
    .grade-btn[data-grade="10"] { border-color: var(--grade10); }
    .grade-btn[data-grade="11"] { border-color: var(--grade11); }

    .grade-btn.active[data-grade="all"] { background: rgba(255,255,255,0.15); color: var(--text); }
    .grade-btn.active[data-grade="45"] { background: rgba(74,144,217,0.25); color: var(--grade4); }
    .grade-btn.active[data-grade="6"] { background: rgba(61,186,110,0.25); color: var(--grade6); }
    .grade-btn.active[data-grade="7"] { background: rgba(232,197,58,0.25); color: var(--grade7); }
    .grade-btn.active[data-grade="8"] { background: rgba(232,130,58,0.25); color: var(--grade8); }
    .grade-btn.active[data-grade="9"] { background: rgba(232,74,74,0.25); color: var(--grade9); }
    .grade-btn.active[data-grade="10"] { background: rgba(180,74,232,0.25); color: var(--grade10); }
    .grade-btn.active[data-grade="11"] { background: rgba(232,74,142,0.25); color: var(--grade11); }

    .grade-btn:hover { opacity: 0.8; }

    .reset-btn {
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      margin-left: auto;
    }
    .reset-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    .stats {
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap;
    }

    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    #graph-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    /* Edges */
    .link {
      stroke-linecap: round;
      transition: opacity 0.2s;
    }

    /* Nodes */
    .node-group {
      cursor: pointer;
    }
    .node-group:hover .node-shape {
      filter: brightness(1.3);
    }

    .node-shape {
      transition: opacity 0.2s;
    }

    .node-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      fill: rgba(255,255,255,0.6);
      pointer-events: none;
      text-anchor: middle;
      dominant-baseline: hanging;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      pointer-events: none;
      font-size: 12px;
      max-width: 240px;
      display: none;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    #tooltip .tt-name {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.4;
    }
    #tooltip .tt-row {
      display: flex;
      gap: 8px;
      margin-top: 3px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
    }
    #tooltip .tt-key {
      color: var(--text-dim);
      min-width: 60px;
    }
    #tooltip .tt-val {
      color: var(--text);
    }

    /* Legend */
    .legend {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 11px;
      min-width: 160px;
    }

    .legend-section {
      margin-bottom: 12px;
    }
    .legend-section:last-child { margin-bottom: 0; }

    .legend-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 7px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .legend-item:last-child { margin-bottom: 0; }

    .legend-color {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .legend-shape {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .legend-text {
      color: var(--text);
      font-size: 11px;
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      line-height: 1.8;
    }
  </style>
</head>

  <div class="header-sep"></div>
  <div class="filter-group">

    <button class="grade-btn active" data-grade="all">Все</button>

// Color by grade
function nodeColor(grade) {
  if (grade <= 5) return '#4a90d9';
  if (grade === 6) return '#3dba6e';
  if (grade === 7) return '#e8c53a';
  if (grade === 8) return '#e8823a';
  if (grade === 9) return '#e84a4a';
  if (grade === 10) return '#b44ae8';
  return '#e84a8e';
}

// Active grade filter state
let activeGrades = new Set(['45','6','7','8','9','10','11']);
let selectedNode = null;

const width = document.getElementById('graph-container').clientWidth;
const height = document.getElementById('graph-container').clientHeight;

const svg = d3.select('#graph')
  .attr('width', width)
  .attr('height', height);

// Arrowhead markers per grade color
const defs = svg.append('defs');

// Generic arrow markers (one per grade color)
['#4a90d9','#3dba6e','#e8c53a','#e8823a','#e84a4a','#b44ae8','#e84a8e','#555577'].forEach((color, i) => {
  defs.append('marker')
    .attr('id', 'arrow-' + i)
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', 16)
    .attr('refY', 0)
    .attr('markerWidth', 5)
    .attr('markerHeight', 5)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L8,0L0,4')
    .attr('fill', color)
    .attr('opacity', 0.7);
});

const container = svg.append('g');

// Zoom
svg.call(d3.zoom()
  .scaleExtent([0.2, 4])
  .on('zoom', (event) => container.attr('transform', event.transform))
);

// Click on background to reset
svg.on('click', (event) => {
  if (event.target === svg.node()) resetSelection();
});

// Build index
const nodeById = {};
nodes.forEach(n => nodeById[n.kc_id] = n);

// Create sim
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(edges).id(d => d.kc_id).distance(d => 70 - d.strength * 30).strength(d => d.strength * 0.4))
  .force('charge', d3.forceManyBody().strength(-220).distanceMax(400))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide(18))
  .force('x', d3.forceX(width / 2).strength(0.03))
  .force('y', d3.forceY(height / 2).strength(0.03));

// Draw edges
const link = container.append('g').attr('class', 'links')
  .selectAll('line')
  .data(edges)
  .join('line')
  .attr('class', 'link')
  .attr('stroke', d => {
    const grade = nodeById[d.source.kc_id || d.source]?.grade_introduced;
    return nodeColor(grade);
  })
  .attr('stroke-opacity', d => 0.15 + d.strength * 0.45)
  .attr('stroke-width', d => 0.5 + d.strength * 2.5)
  .attr('marker-end', d => {
    const grade = nodeById[d.source.kc_id || d.source]?.grade_introduced;
    if (grade <= 5) return 'url(#arrow-0)';
    if (grade === 6) return 'url(#arrow-1)';
    if (grade === 7) return 'url(#arrow-2)';
    if (grade === 8) return 'url(#arrow-3)';
    if (grade === 9) return 'url(#arrow-4)';
    if (grade === 10) return 'url(#arrow-5)';
    return 'url(#arrow-6)';
  });

// Draw nodes
const nodeGroup = container.append('g').attr('class', 'nodes')
  .selectAll('g')
  .data(nodes)
  .join('g')
  .attr('class', 'node-group')
  .call(d3.drag()
    .on('start', dragstarted)
    .on('drag', dragged)
    .on('end', dragended)
  )
  .on('mouseover', showTooltip)
  .on('mousemove', moveTooltip)
  .on('mouseout', hideTooltip)
  .on('click', (event, d) => {
    event.stopPropagation();
    selectNode(d);
  });

// Star polygon path
function starPath(r) {
  const points = [];
  for (let i = 0; i < 5; i++) {
    const outerAngle = (i * 4 * Math.PI / 5) - Math.PI / 2;
    const innerAngle = outerAngle + (2 * Math.PI / 10);
    points.push([r * Math.cos(outerAngle), r * Math.sin(outerAngle)]);
    points.push([r * 0.42 * Math.cos(innerAngle), r * 0.42 * Math.sin(innerAngle)]);
  }
  return 'M' + points.map(p => p.join(',')).join('L') + 'Z';
}

// Add shapes
nodeGroup.each(function(d) {
  const g = d3.select(this);
  const color = nodeColor(d.grade_introduced);
  const r = 8;

  if (d.kc_type === 'procedural') {
    g.append('circle')
      .attr('class', 'node-shape')
      .attr('r', r)
      .attr('fill', color)
      .attr('stroke', 'rgba(255,255,255,0.15)')
      .attr('stroke-width', 1);
  } else if (d.kc_type === 'declarative') {
    g.append('rect')
      .attr('class', 'node-shape')
      .attr('x', -r)
      .attr('y', -r)
      .attr('width', r * 2)
      .attr('height', r * 2)
      .attr('rx', 2)
      .attr('fill', color)
      .attr('stroke', 'rgba(255,255,255,0.15)')
      .attr('stroke-width', 1);
  } else {
    // applied = star
    g.append('path')
      .attr('class', 'node-shape')
      .attr('d', starPath(r + 3))
      .attr('fill', color)
      .attr('stroke', 'rgba(255,255,255,0.15)')
      .attr('stroke-width', 1);
  }
});

// Simulation tick
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Drag
function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x; d.fy = event.y;
}
function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// Tooltip
const tooltip = document.getElementById('tooltip');
const typeLabels = { procedural: 'Procedural', declarative: 'Declarative', applied: 'Applied' };

function showTooltip(event, d) {
  tooltip.style.display = 'block';
  tooltip.innerHTML = `
    <div class="tt-name">${d.name}</div>
    <div class="tt-row"><span class="tt-key">ID</span><span class="tt-val">${d.kc_id}</span></div>
    <div class="tt-row"><span class="tt-key">Класс</span><span class="tt-val">${d.grade_introduced}</span></div>
    <div class="tt-row"><span class="tt-key">Тип</span><span class="tt-val">${typeLabels[d.kc_type]}</span></div>
    <div class="tt-row"><span class="tt-key">Сложность</span><span class="tt-val">${d.difficulty_base.toFixed(2)}</span></div>
  `;
  moveTooltip(event);
}

function moveTooltip(event) {
  const x = event.clientX + 14;
  const y = event.clientY - 10;
  const tw = tooltip.offsetWidth;
  const winW = window.innerWidth;
  tooltip.style.left = (x + tw > winW - 10 ? x - tw - 28 : x) + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

// Node selection
function selectNode(d) {
  selectedNode = d;
  const connected = new Set([d.kc_id]);
  edges.forEach(e => {
    const sid = e.source.kc_id || e.source;
    const tid = e.target.kc_id || e.target;
    if (sid === d.kc_id) connected.add(tid);
    if (tid === d.kc_id) connected.add(sid);
  });

  nodeGroup.selectAll('.node-shape')
    .attr('opacity', nd => connected.has(nd.kc_id) ? 1 : 0.1);

  link
    .attr('stroke-opacity', e => {
      const sid = e.source.kc_id || e.source;
      const tid = e.target.kc_id || e.target;
      return (sid === d.kc_id || tid === d.kc_id) ? 0.9 : 0.03;
    })
    .attr('stroke-width', e => {
      const sid = e.source.kc_id || e.source;
      const tid = e.target.kc_id || e.target;
      return (sid === d.kc_id || tid === d.kc_id) ? 2 + e.strength * 2 : 0.5 + e.strength * 2.5;
    });
}

function resetSelection() {
  selectedNode = null;
  applyGradeFilter();
}

// Grade filter
function applyGradeFilter() {
  nodeGroup.each(function(d) {
    const grade = d.grade_introduced;
    const inFilter = isGradeActive(grade);
    d3.select(this).attr('display', inFilter ? null : 'none');
  });

  link.each(function(e) {
    const sid = e.source.kc_id || e.source;
    const tid = e.target.kc_id || e.target;
    const sg = nodeById[sid]?.grade_introduced;
    const tg = nodeById[tid]?.grade_introduced;
    const inFilter = (isGradeActive(sg) && isGradeActive(tg));
    d3.select(this).attr('display', inFilter ? null : 'none');
  });

  // Reset visual weights
  link
    .attr('stroke-opacity', d => 0.15 + d.strength * 0.45)
    .attr('stroke-width', d => 0.5 + d.strength * 2.5);

  nodeGroup.selectAll('.node-shape').attr('opacity', 1);

  // Update stats
  const visNodes = nodes.filter(n => isGradeActive(n.grade_introduced)).length;
  const visEdges = edges.filter(e => {
    const sg = nodeById[e.source.kc_id || e.source]?.grade_introduced;
    const tg = nodeById[e.target.kc_id || e.target]?.grade_introduced;
    return isGradeActive(sg) && isGradeActive(tg);
  }).length;
  document.getElementById('stats').textContent = `${visNodes} KC · ${visEdges} рёбер`;
}

function isGradeActive(grade) {
  if (grade <= 5) return activeGrades.has('45');
  if (grade === 10) return activeGrades.has('10');
  if (grade === 11) return activeGrades.has('11');
  return activeGrades.has(String(grade));
}

// Grade button handlers
document.querySelectorAll('.grade-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const g = btn.dataset.grade;
    if (g === 'all') {
      activeGrades = new Set(['45','6','7','8','9','10','11']);
      document.querySelectorAll('.grade-btn[data-grade!="all"]').forEach(b => b.classList.add('active'));
      btn.classList.add('active');
    } else {
      document.querySelector('.grade-btn[data-grade="all"]').classList.remove('active');
      if (activeGrades.has(g)) {
        activeGrades.delete(g);
        btn.classList.remove('active');
      } else {
        activeGrades.add(g);
        btn.classList.add('active');
      }
      if (activeGrades.size === 7) {
        document.querySelector('.grade-btn[data-grade="all"]').classList.add('active');
      }
    }
    selectedNode = null;
    applyGradeFilter();
  });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  resetSelection();
});

// Initial
applyGradeFilter();
</script>
</body>
